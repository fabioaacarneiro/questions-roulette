{{ define "question-item" }}
<li id="question-{{.ID}}" class="bg-white rounded-xl border border-slate-100 shadow-sm px-5 py-4 flex items-center justify-between gap-4">
    <h3 class="text-slate-700 font-medium flex-1">{{.Question}}</h3>

    <div class="flex items-center gap-2 shrink-0">
        <button
            class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition-colors"
            onclick="document.getElementById('update-dialog-{{.ID}}').showModal()">
            Atualizar
        </button>
        <dialog id="update-dialog-{{.ID}}" class="rounded-2xl shadow-2xl p-6 w-full max-w-md border-0">
            <h2 class="text-lg font-semibold text-slate-800 mb-4">Atualizar Pergunta</h2>
            <form hx-post="/question/update/{{.ID}}"
                  hx-target="#question-{{.ID}}"
                  hx-swap="outerHTML"
                  hx-on::after-request="this.closest('dialog').close()">
                <div class="mb-1">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Pergunta</label>
                    <input type="text" name="question" required value="{{.Question}}"
                        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
                </div>
                <div class="flex justify-end gap-2 mt-5">
                    <button type="button" onclick="this.closest('dialog').close()"
                        class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                        Cancelar
                    </button>
                    <button type="submit"
                        class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                        Atualizar
                    </button>
                </div>
            </form>
        </dialog>

        <button
            class="bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition-colors"
            hx-delete="/question/{{.ID}}"
            hx-target="#question-{{.ID}}"
            hx-swap="outerHTML"
            hx-confirm="Tem certeza de que deseja excluir esta pergunta?">
            Excluir
        </button>
    </div>
</li>
{{ end }}
