{{ define "content" }}
<div class="max-w-3xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">{{ .Title }}</h1>

    <ul id="questions-list" class="flex flex-col gap-3">
        {{ if .Questions }}
        {{range .Questions}}
            {{ template "question-item" . }}
        {{end}}
        {{else}}
        <li class="text-center text-slate-400 py-16 text-sm">Nenhuma pergunta encontrada. Adicione uma abaixo!</li>
        {{ end }}
    </ul>
</div>

<button
    class="fixed bottom-8 right-8 bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-full shadow-lg text-3xl flex items-center justify-center transition-all hover:scale-105 leading-none"
    onclick="document.getElementById('store-question').showModal()">
    +
</button>

<dialog id="store-question" class="rounded-2xl shadow-2xl p-6 w-full max-w-md border-0">
    <h2 class="text-lg font-semibold text-slate-800 mb-4">Nova Pergunta</h2>
    <form hx-post="/question/store"
          hx-target="#questions-list"
          hx-swap="beforeend"
          hx-on::after-request="this.reset(); this.closest('dialog').close()">
        <div class="mb-1">
            <label for="question" class="block text-sm font-medium text-slate-600 mb-1">Pergunta</label>
            <input type="text" id="question" name="question" required
                class="w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
        </div>
        <div class="flex justify-end gap-2 mt-5">
            <button type="button" onclick="this.closest('dialog').close()"
                class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                Cancelar
            </button>
            <button type="submit"
                class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                Cadastrar
            </button>
        </div>
    </form>
</dialog>
{{ end }}
