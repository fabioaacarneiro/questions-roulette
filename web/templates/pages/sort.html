{{ define "content" }}
<div class="max-w-3xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-8">Sortear Pergunta</h1>

    <button
        hx-get="/question/sort"
        hx-target="#resultado"
        hx-swap="innerHTML"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-3 rounded-xl transition-colors">
        Sortear
    </button>

    <div id="resultado" class="mt-8"></div>
</div>
{{ end }}
